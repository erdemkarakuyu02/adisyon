<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çalıkuşu Kafe - Profesyonel Adisyon</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <div id="kitchen-panel" class="bg-red-50 p-4 border-b border-red-200 hidden shrink-0">
        <h3 class="font-bold text-red-900 text-sm mb-2"><i class="fa-solid fa-bell mr-2"></i>ONAY BEKLEYEN SİPARİŞLER</h3>
        <div id="pending-orders-list" class="flex gap-3 overflow-x-auto"></div>
    </div>

    <main class="flex-1 flex overflow-hidden">
        <section class="flex-1 p-4 overflow-y-auto">
            <div id="tables-grid" class="grid grid-cols-4 gap-3 mb-6"></div>
            <div id="menu-grid" class="grid grid-cols-4 gap-2"></div>
        </section>

        <aside class="w-80 bg-white border-l p-4 flex flex-col">
            <h2 id="selected-table-name" class="font-bold text-lg mb-2">Masa Seçin</h2>
            <div id="order-list" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
            <button onclick="sendOrder()" class="w-full bg-rose-700 text-white p-3 rounded-lg font-bold">Mutfağa Gönder</button>
            <button onclick="payOrder()" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-bold mt-2">Ödeme Al</button>
        </aside>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUXrOuTaBdi9ne6WwguNWkeZANs0x8k4Y",
            authDomain: "calikusu-kafe.firebaseapp.com",
            databaseURL: "https://calikusu-kafe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "calikusu-kafe",
            storageBucket: "calikusu-kafe.firebasestorage.app",
            messagingSenderId: "755014927811",
            appId: "1:755014927811:web:557f08cfdc920ffaaea976"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { tables: {}, menu: [], pending: [], selectedTableId: null };

        db.ref('pos_data').on('value', (snap) => {
            if(snap.val()) { state = snap.val(); updateUI(); } else { init(); }
        });

        function init() {
            state.menu = [{id:1, name:"Çay", price:25}, {id:2, name:"Kahve", price:60}, {id:3, name:"Tost", price:120}];
            for(let i=1; i<=12; i++) state.tables[i] = {id:i, name:"Masa "+i, orders:[], status:'empty'};
            save();
        }

        function save() { db.ref('pos_data').set(state); }

        function updateUI() {
            // Masalar
            const g = document.getElementById('tables-grid'); g.innerHTML = '';
            Object.values(state.tables).forEach(t => {
                const b = document.createElement('button');
                b.className = `p-4 rounded-xl border ${state.selectedTableId == t.id ? 'bg-rose-200 border-rose-500' : 'bg-white'} ${t.status === 'occupied' ? 'border-l-4 border-l-rose-600' : ''}`;
                b.innerText = t.name;
                b.onclick = () => { state.selectedTableId = t.id; save(); };
                g.appendChild(b);
            });

            // Bekleyen Siparişler
            const pL = document.getElementById('pending-orders-list');
            const pP = document.getElementById('kitchen-panel');
            pL.innerHTML = '';
            if(state.pending && state.pending.length > 0) {
                pP.classList.remove('hidden');
                state.pending.forEach(p => {
                    const d = document.createElement('div');
                    d.className = "bg-white p-3 rounded-lg border border-red-200 text-xs shadow-sm min-w-[150px]";
                    d.innerHTML = `<b>${p.tableName}</b><br>${p.orders.map(o=>o.name).join(', ')}<br><button onclick="approve(${p.id})" class="bg-emerald-600 text-white w-full mt-2 py-1 rounded">Onayla</button>`;
                    pL.appendChild(d);
                });
            } else pP.classList.add('hidden');

            // Adisyon Listesi
            const oL = document.getElementById('order-list'); oL.innerHTML = '';
            if(state.selectedTableId && state.tables[state.selectedTableId]) {
                const t = state.tables[state.selectedTableId];
                document.getElementById('selected-table-name').innerText = t.name;
                t.orders.forEach(o => oL.innerHTML += `<div class="p-2 bg-slate-50 rounded text-sm">${o.name} - ${o.price} ₺</div>`);
            }
        }

        function sendOrder() {
            const t = state.tables[state.selectedTableId];
            if(!t.orders.length) return;
            if(!state.pending) state.pending = [];
            state.pending.push({id: Date.now(), tableId: t.id, tableName: t.name, orders: [...t.orders]});
            t.orders = []; // Garsonun ekranından sildik
            save();
        }

        function approve(id) {
            const p = state.pending.find(x => x.id === id);
            state.tables[p.tableId].orders = [...state.tables[p.tableId].orders, ...p.orders];
            state.tables[p.tableId].status = 'occupied';
            state.pending = state.pending.filter(x => x.id !== id);
            save();
        }

        function payOrder() {
            state.tables[state.selectedTableId].orders = [];
            state.tables[state.selectedTableId].status = 'empty';
            save();
        }

        // Menü Render
        const mG = document.getElementById('menu-grid');
        state.menu.forEach(p => {
            const b = document.createElement('button');
            b.className = "p-2 bg-white rounded border text-sm";
            b.innerText = p.name;
            b.onclick = () => { state.tables[state.selectedTableId].orders.push(p); save(); };
            mG.appendChild(b);
        });
    </script>
</body>
</html>
