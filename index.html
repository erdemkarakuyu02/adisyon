<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patika Teras Kafe - Adisyon Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <header class="bg-amber-800 text-amber-50 px-6 py-4 flex items-center justify-between shadow-md shrink-0">
        <div>
            <h1 class="text-2xl font-bold tracking-wide">Patika Teras Kafe</h1>
            <p class="text-xs text-amber-200 uppercase tracking-widest">Adisyon & POS</p>
        </div>
        <div id="live-clock" class="font-mono text-sm bg-amber-900/30 px-3 py-1 rounded"></div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="flex-1 p-6 overflow-y-auto">
            <div id="tables-grid" class="grid grid-cols-4 gap-4 mb-8"></div>
            <div id="menu-items-grid" class="grid grid-cols-4 gap-3"></div>
        </section>

        <aside class="w-96 bg-white border-l p-6 flex flex-col shadow-lg">
            <h2 id="active-table-name" class="text-xl font-bold mb-4">Masa Seçin</h2>
            <div id="order-items-container" class="flex-1 overflow-y-auto space-y-2"></div>
            <div class="pt-4 border-t space-y-2">
                <button onclick="processPayment('Nakit')" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">Nakit Ödeme</button>
                <button onclick="processPayment('Kart')" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Kart Ödeme</button>
                <button onclick="triggerOrderCancellation()" class="w-full bg-red-100 text-red-600 py-2 rounded-lg font-semibold text-sm">Adisyonu İptal Et</button>
            </div>
        </aside>
    </main>

    <script>
        // --- State ---
        let state = { tables: {}, menu: [], selectedTableId: null };

        // --- Başlatma ---
        window.onload = function() {
            initDefaultState();
            render();
            setInterval(() => {
                document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('tr-TR');
            }, 1000);
        };

        function initDefaultState() {
            state.menu = [
                {id: 1, name: "Çay", price: 25}, {id: 2, name: "Kahve", price: 60}, 
                {id: 3, name: "Tost", price: 120}, {id: 4, name: "San Sebastian", price: 160}
            ];
            for(let i=1; i<=12; i++) state.tables[i] = {id:i, name:"Masa "+i, orders:[], status:'empty'};
        }

        // --- Render ---
        function render() {
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';
            Object.values(state.tables).forEach(t => {
                const btn = document.createElement('button');
                btn.className = `p-4 rounded-xl border-2 transition ${state.selectedTableId == t.id ? 'bg-amber-100 border-amber-500' : 'bg-white border-slate-200'}`;
                btn.innerText = t.name;
                btn.onclick = () => { state.selectedTableId = t.id; render(); };
                grid.appendChild(btn);
            });

            const mGrid = document.getElementById('menu-items-grid');
            mGrid.innerHTML = '';
            state.menu.forEach(p => {
                const b = document.createElement('button');
                b.className = "bg-white p-3 rounded-lg border text-sm hover:border-amber-500";
                b.innerText = p.name;
                b.onclick = () => {
                    if(!state.selectedTableId) return alert("Masa seç!");
                    state.tables[state.selectedTableId].orders.push(p);
                    state.tables[state.selectedTableId].status = 'occupied';
                    render();
                };
                mGrid.appendChild(b);
            });

            const oL = document.getElementById('order-items-container');
            oL.innerHTML = '';
            if(state.selectedTableId) {
                const t = state.tables[state.selectedTableId];
                document.getElementById('active-table-name').innerText = t.name;
                t.orders.forEach((o, idx) => oL.innerHTML += `<div class="p-2 bg-slate-50 rounded flex justify-between">${o.name} <span>${o.price}₺</span></div>`);
            }
        }

        function processPayment(m) {
            state.tables[state.selectedTableId].orders = [];
            state.tables[state.selectedTableId].status = 'empty';
            render();
        }

        function triggerOrderCancellation() {
            state.tables[state.selectedTableId].orders = [];
            state.tables[state.selectedTableId].status = 'empty';
            render();
        }
    </script>
</body>
</html>
